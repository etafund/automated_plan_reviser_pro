name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_v18_live_cutover:
        description: "Run the opt-in v18 live cutover dress rehearsal"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  checksums:
    name: Checksum Consistency
    runs-on: ubuntu-latest
    # Only run on PRs - pushes to main are handled by auto-checksum.yml workflow
    # This avoids race conditions where CI and auto-checksum run concurrently
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checksums match scripts
        run: |
          set -euo pipefail

          echo "Checking checksum files..."

          # Calculate actual checksums
          apr_actual=$(sha256sum apr | awk '{print $1}')
          install_actual=$(sha256sum install.sh | awk '{print $1}')

          # Read stored checksums
          apr_stored=$(cat apr.sha256 2>/dev/null | awk '{print $1}' | tr -d '[:space:]' || echo "MISSING")
          install_stored=$(cat install.sh.sha256 2>/dev/null | awk '{print $1}' | tr -d '[:space:]' || echo "MISSING")

          failed=false

          echo "apr:"
          echo "  actual: $apr_actual"
          echo "  stored: $apr_stored"
          if [[ "$apr_actual" != "$apr_stored" ]]; then
            echo "::error file=apr.sha256::Checksum mismatch! apr.sha256 contains '$apr_stored' but apr has checksum '$apr_actual'. Run 'make update-checksums' to fix."
            failed=true
          fi

          echo "install.sh:"
          echo "  actual: $install_actual"
          echo "  stored: $install_stored"
          if [[ "$install_actual" != "$install_stored" ]]; then
            echo "::error file=install.sh.sha256::Checksum mismatch! install.sh.sha256 contains '$install_stored' but install.sh has checksum '$install_actual'. Run 'make update-checksums' to fix."
            failed=true
          fi

          if $failed; then
            echo ""
            echo "::error::CHECKSUM MISMATCH DETECTED! The installer will fail for users."
            echo "::error::Fix by running: make update-checksums && git add *.sha256 checksums.txt CHECKSUMS.sha256"
            exit 1
          fi

          # Also verify the combined files
          sha256sum -c checksums.txt
          sha256sum -c CHECKSUMS.sha256
          echo "All checksums verified!"

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
          additional_files: 'apr install.sh'

  syntax:
    name: Bash Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check apr syntax
        run: bash -n apr

      - name: Check install.sh syntax
        run: bash -n install.sh

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          # Check if VERSION file exists
          if [[ ! -f VERSION ]]; then
            echo "::warning::VERSION file not found (optional)"
            exit 0
          fi

          echo "VERSION file found: $(cat VERSION)"

          # Extract version from script
          script_version=$(grep -m1 '^VERSION=' apr | cut -d'"' -f2)

          # Extract version from VERSION file
          file_version=$(cat VERSION | tr -d '[:space:]')

          echo "Script VERSION variable: $script_version"
          echo "VERSION file: $file_version"

          if [[ "$script_version" != "$file_version" ]]; then
            echo "::error::Version mismatch! Script has '$script_version' but VERSION file has '$file_version'"
            exit 1
          fi

          echo "Versions match: $script_version"

  functional-test:
    name: Functional Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [shellcheck, syntax]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bash 5 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH

      - name: Display bash version
        run: bash --version

      - name: Create test output directory
        run: mkdir -p test-results

      - name: Make apr executable
        run: chmod +x apr

      - name: Test apr --version
        run: |
          ./apr --version 2>&1 | tee test-results/version.txt
          grep -E '[0-9]+\.[0-9]+\.[0-9]+' test-results/version.txt

      - name: Test apr --help
        run: ./apr --help 2>&1 | tee test-results/help.txt

      - name: Create mock workflow for testing
        run: |
          mkdir -p .apr/workflows .apr/rounds/test
          cat > .apr/workflows/test.yaml << 'EOF'
          name: test
          description: Test workflow for CI
          documents:
            readme: README.md
            spec: AGENTS.md
          oracle:
            model: "5.2 Thinking"
          rounds:
            output_dir: .apr/rounds/test
          EOF
          cat > .apr/config.yaml << 'EOF'
          default_workflow: test
          EOF

      - name: Test apr list
        run: ./apr list 2>&1 | tee test-results/list.txt

      - name: Test apr history (empty)
        run: ./apr history 2>&1 | tee test-results/history.txt || true

      - name: Create mock Oracle for dry-run tests
        run: |
          mkdir -p /tmp/mock-bin
          cat > /tmp/mock-bin/oracle << 'EOF'
          #!/bin/bash
          echo "Mock Oracle v1.0.0"
          exit 0
          EOF
          chmod +x /tmp/mock-bin/oracle
          echo "/tmp/mock-bin" >> $GITHUB_PATH

      - name: Test apr run --dry-run
        run: |
          ./apr run 1 --dry-run 2>&1 | tee test-results/dry-run.txt
          grep -q "Would execute" test-results/dry-run.txt && echo "Dry run test passed!"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: test-results/
          retention-days: 14

  robot-mode-test:
    name: Robot Mode Tests
    runs-on: ubuntu-latest
    needs: [shellcheck, syntax]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Make apr executable
        run: chmod +x apr

      - name: Test robot status (unconfigured)
        run: |
          result=$(./apr robot status 2>/dev/null || true)
          echo "$result" | jq .

          # Should indicate not configured
          configured=$(echo "$result" | jq -r '.data.configured')
          if [[ "$configured" == "true" ]]; then
            echo "::error::Expected configured=false for unconfigured project"
            exit 1
          fi
          echo "Robot status test passed (unconfigured state)"

      - name: Initialize .apr directory
        run: |
          result=$(./apr robot init)
          echo "$result" | jq .

          ok=$(echo "$result" | jq -r '.ok')
          if [[ "$ok" != "true" ]]; then
            echo "::error::robot init failed"
            exit 1
          fi
          echo "Robot init test passed"

      - name: Create test workflow
        run: |
          mkdir -p .apr/workflows .apr/rounds/test
          cat > .apr/workflows/test.yaml << 'EOF'
          name: test
          description: Test workflow for robot mode
          documents:
            readme: README.md
            spec: AGENTS.md
          oracle:
            model: "5.2 Thinking"
          rounds:
            output_dir: .apr/rounds/test
          EOF
          cat > .apr/config.yaml << 'EOF'
          default_workflow: test
          EOF

      - name: Test robot status (configured)
        run: |
          result=$(./apr robot status)
          echo "$result" | jq .

          configured=$(echo "$result" | jq -r '.data.configured')
          if [[ "$configured" != "true" ]]; then
            echo "::error::Expected configured=true after init"
            exit 1
          fi
          echo "Robot status test passed (configured state)"

      - name: Test robot workflows
        run: |
          result=$(./apr robot workflows)
          echo "$result" | jq .

          count=$(echo "$result" | jq '.data.workflows | length')
          if [[ "$count" -lt 1 ]]; then
            echo "::error::Expected at least 1 workflow"
            exit 1
          fi
          echo "Robot workflows test passed"

      - name: Test robot validate (missing previous round)
        run: |
          # Round 2 should fail validation (no round 1)
          result=$(./apr robot validate 2 --workflow test 2>/dev/null || true)
          echo "$result" | jq .

          valid=$(echo "$result" | jq -r '.data.valid')
          if [[ "$valid" == "true" ]]; then
            echo "::warning::Expected validation to fail for round 2 without round 1"
          fi
          echo "Robot validate test passed"

      - name: Test robot help
        run: |
          result=$(./apr robot help)
          echo "$result" | jq .

          ok=$(echo "$result" | jq -r '.ok')
          if [[ "$ok" != "true" ]]; then
            echo "::error::robot help failed"
            exit 1
          fi
          echo "Robot help test passed"

  install-test:
    name: Installer Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [shellcheck, syntax]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bash 5 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash
          echo "$(brew --prefix)/bin" >> $GITHUB_PATH

      - name: Display bash version
        run: bash --version

      - name: Create isolated test environment
        run: |
          TEST_HOME=$(mktemp -d)
          echo "TEST_HOME=$TEST_HOME" >> $GITHUB_ENV

      - name: Test installer with local file
        run: |
          # Use a modified installer that copies from local instead of downloading
          export HOME="$TEST_HOME"
          export APR_NO_DEPS=1
          # The installer normally verifies against main-branch checksums; in CI we install from the
          # checked-out workspace copy, and checksums are validated separately above.
          export APR_SKIP_VERIFY=1

          # Create modified installer for testing
          sed 's|download_file "$download_url" "$tmp_file"|cp "'"$(pwd)"'/apr" "$tmp_file"|g' install.sh > /tmp/test_install.sh

          # Run the modified installer
          bash /tmp/test_install.sh

      - name: Verify installation
        run: |
          export HOME="$TEST_HOME"

          # Check executable exists
          if [[ ! -x "$HOME/.local/bin/apr" ]]; then
            echo "::error::apr not installed to $HOME/.local/bin/"
            ls -la "$HOME/.local/bin/" || true
            exit 1
          fi

          echo "Installation successful!"

      - name: Verify apr works after installation
        run: |
          export HOME="$TEST_HOME"
          export PATH="$HOME/.local/bin:$PATH"

          # Test version
          apr --version

          # Test help (first 20 lines)
          apr --help 2>&1 | head -20

      - name: Cleanup
        if: always()
        run: |
          if [[ -n "$TEST_HOME" && -d "$TEST_HOME" ]]; then
            rm -rf "$TEST_HOME"
          fi

  bats-tests:
    # bd-347: run the vendored bats-core against tests/unit, tests/integration,
    # and tests/e2e so the high-cost-failure suites (placeholder leaks, lint
    # gate regressions, busy/queue contract drift, manifest/ledger/ACK
    # provenance, error contract) are caught on every PR before release.
    name: BATS Test Suites
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Bash 5 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin"    >> "$GITHUB_PATH"

      - name: Ensure jq + python3 are present
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            if [[ "$RUNNER_OS" == "Linux" ]]; then
              sudo apt-get update && sudo apt-get install -y jq
            else
              brew install jq
            fi
          fi
          jq --version
          python3 --version

      - name: Ensure vendored BATS is executable
        run: |
          chmod +x tests/lib/bats-core/bin/bats || true
          ls -la tests/lib/bats-core/bin/

      - name: Make apr executable
        run: chmod +x apr

      - name: Export APR_LIB_DIR for the tests
        # tests/helpers/test_helper.bash sources apr via a sed-stripped temp
        # copy; APR_LIB_DIR points apr_source_optional_libs at the real lib/
        # directory so apr_lib_* helpers (manifest/validate/ack/busy/etc.)
        # are reachable in unit tests.
        run: echo "APR_LIB_DIR=$GITHUB_WORKSPACE/lib" >> "$GITHUB_ENV"

      - name: Run BATS unit suites
        run: tests/lib/bats-core/bin/bats --tap tests/unit/*.bats

      - name: Run BATS integration suites
        run: tests/lib/bats-core/bin/bats --tap tests/integration/*.bats

      - name: Run BATS E2E suites
        run: tests/lib/bats-core/bin/bats --tap tests/e2e/*.bats

      - name: Upload BATS logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bats-logs-${{ matrix.os }}
          path: |
            tests/logs/
          if-no-files-found: ignore
          retention-days: 14

  v18-deterministic-suites:
    name: v18 Contract/Mock/Negative Suites
    runs-on: ubuntu-latest
    needs: [shellcheck, syntax]
    timeout-minutes: 30
    env:
      APR_LIB_DIR: ${{ github.workspace }}/lib
      APR_NO_GUM: "1"
      NO_COLOR: "1"
      CI: "true"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deterministic harness dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq python3-jsonschema
          python3 -c 'import jsonschema; print("jsonschema", jsonschema.__version__)'

      - name: Prepare APR test environment
        run: |
          set -euo pipefail
          chmod +x apr tests/lib/bats-core/bin/bats
          mkdir -p tests/logs/v18/ci tests/logs/v18/contracts .apr/runs/planning v18-ci-results

      - name: Run deterministic v18 suites
        run: |
          set -euo pipefail

          results_file="v18-ci-results/results.tsv"
          summary_file="v18-ci-results/summary.md"
          failures_file="v18-ci-results/failed-scenarios.txt"
          artifact_note="v18-contract-mock-negative-artifacts"
          : > "$results_file"
          : > "$failures_file"
          failed=()

          run_suite() {
            local suite_id="$1"
            local rerun_command="$2"
            shift 2

            local log_path="tests/logs/v18/ci/${suite_id}.log"
            local started_at finished_at duration status_code outcome
            started_at="$(date +%s)"

            echo "::group::${suite_id}"
            {
              printf 'suite_id=%s\n' "$suite_id"
              printf 'rerun_command=%s\n\n' "$rerun_command"
            } | tee "$log_path"

            if "$@" > >(tee -a "$log_path") 2> >(tee -a "$log_path" >&2); then
              status_code=0
              outcome="pass"
            else
              status_code=$?
              outcome="fail"
              failed+=("$suite_id")
              printf '%s\n' "$suite_id" >> "$failures_file"
            fi

            finished_at="$(date +%s)"
            duration=$((finished_at - started_at))
            printf '%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$suite_id" "$outcome" "$status_code" "$duration" "$log_path" "$rerun_command" \
              >> "$results_file"
            echo "::endgroup::"
          }

          bundle_script_root="PLAN/apr-vnext-plan-bundle-v18.0.0/scripts"
          v18_integration_suites=(
            tests/integration/test_v18_check_conformance.bats
            tests/integration/test_v18_contract_roundtrip.bats
            tests/integration/test_v18_cross_invariant.bats
            tests/integration/test_v18_mock_e2e_profiles.bats
            tests/integration/test_v18_negative_security_regressions.bats
            tests/integration/test_v18_prompt_compiler_conformance.bats
            tests/integration/test_v18_provider_adapter_pipeline_conformance.bats
            tests/integration/test_v18_schema_corpus_conformance.bats
            tests/integration/test_v18_schema_metamorphic_conformance.bats
          )
          v18_unit_suites=(
            tests/unit/test_v18_claude_codex_adapters.bats
            tests/unit/test_v18_history_show_ux.bats
            tests/unit/test_v18_model_policy.bats
            tests/unit/test_v18_plan_export.bats
            tests/unit/test_v18_prompt_cli.bats
            tests/unit/test_v18_run_ops.bats
            tests/unit/test_v18_schema_conformance.bats
            tests/unit/test_v18_ui_refresh.bats
            tests/unit/test_v18_workflow_explain.bats
          )

          run_suite "contract-roundtrip" \
            "python3 tests/v18_contract_roundtrip.py" \
            python3 tests/v18_contract_roundtrip.py
          run_suite "fixture-route-smoke" \
            "python3 ${bundle_script_root}/contract-fixture-smoke.py --json" \
            python3 "${bundle_script_root}/contract-fixture-smoke.py" --json
          run_suite "schema-corpus" \
            "python3 ${bundle_script_root}/schema-corpus-conformance.py --json" \
            python3 "${bundle_script_root}/schema-corpus-conformance.py" --json
          run_suite "schema-roundtrip" \
            "python3 ${bundle_script_root}/schema-roundtrip-conformance.py --json" \
            python3 "${bundle_script_root}/schema-roundtrip-conformance.py" --json
          run_suite "schema-cross-invariant" \
            "python3 ${bundle_script_root}/schema-cross-invariant-conformance.py --json" \
            python3 "${bundle_script_root}/schema-cross-invariant-conformance.py" --json
          run_suite "schema-metamorphic" \
            "python3 ${bundle_script_root}/schema-metamorphic-conformance.py --json" \
            python3 "${bundle_script_root}/schema-metamorphic-conformance.py" --json
          run_suite "provider-pipeline" \
            "python3 ${bundle_script_root}/provider-adapter-pipeline-conformance.py --json" \
            python3 "${bundle_script_root}/provider-adapter-pipeline-conformance.py" --json
          run_suite "mock-e2e-profiles" \
            "python3 ${bundle_script_root}/mock-e2e-profiles.py --json --profile all" \
            python3 "${bundle_script_root}/mock-e2e-profiles.py" --json --profile all
          run_suite "negative-security" \
            "python3 ${bundle_script_root}/negative-security-regression.py --json" \
            python3 "${bundle_script_root}/negative-security-regression.py" --json
          run_suite "v18-unit-bats" \
            "tests/lib/bats-core/bin/bats --tap ${v18_unit_suites[*]}" \
            tests/lib/bats-core/bin/bats --tap "${v18_unit_suites[@]}"
          run_suite "v18-integration-bats" \
            "tests/lib/bats-core/bin/bats --tap ${v18_integration_suites[*]}" \
            tests/lib/bats-core/bin/bats --tap "${v18_integration_suites[@]}"

          {
            echo "# v18 deterministic CI suites"
            echo
            echo "| Suite | Status | Seconds | Log | Rerun |"
            echo "| --- | --- | ---: | --- | --- |"
            while IFS=$'\t' read -r suite_id outcome status_code duration log_path rerun_command; do
              echo "| \`${suite_id}\` | \`${outcome}\` (${status_code}) | ${duration} | \`${log_path}\` | \`${rerun_command}\` |"
            done < "$results_file"
            echo
            echo "Artifact bundle path: \`${artifact_note}\`"
            echo "Uploaded paths: \`tests/logs/v18/**\`, \`.apr/runs/planning/**\`, \`v18-ci-results/**\`."
            if ((${#failed[@]} > 0)); then
              echo
              echo "Failed scenario ids:"
              sed 's/^/- `/' "$failures_file" | sed 's/$/`/'
            else
              echo
              echo "Failed scenario ids: none"
            fi
            echo
            echo "Live cutover is not automatic. Trigger \`workflow_dispatch\` with \`run_v18_live_cutover=true\` for the opt-in dress rehearsal."
          } > "$summary_file"

          cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"

          if ((${#failed[@]} > 0)); then
            exit 1
          fi

      - name: Upload v18 contract/mock/negative logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v18-contract-mock-negative-artifacts
          path: |
            tests/logs/v18/**
            .apr/runs/planning/**
            v18-ci-results/**
          if-no-files-found: ignore
          retention-days: 14

  v18-live-cutover-opt-in:
    name: v18 Live Cutover Dress Rehearsal
    runs-on: ubuntu-latest
    needs: [shellcheck, syntax]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_v18_live_cutover == 'true'
    timeout-minutes: 20
    env:
      APR_LIB_DIR: ${{ github.workspace }}/lib
      APR_NO_GUM: "1"
      NO_COLOR: "1"
      CI: "true"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install opt-in harness dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run opt-in live cutover dress rehearsal
        run: |
          set -euo pipefail
          chmod +x apr tests/lib/bats-core/bin/bats
          tests/lib/bats-core/bin/bats --tap tests/integration/test_v18_live_cutover_dress_rehearsal.bats

      - name: Upload live cutover dress rehearsal logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v18-live-cutover-dress-rehearsal-logs
          path: |
            tests/logs/v18/**
          if-no-files-found: ignore
          retention-days: 14

  negative-regression:
    # bd-347 section 3: explicit negative-regression checks. A workflow
    # containing a bare {{README}} placeholder MUST fail lint with
    # code=validation_failed and exit 4. This is the backstop against the
    # original placeholder-leak incident class.
    name: Placeholder-Leak Regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ensure jq is present
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Make apr executable
        run: chmod +x apr

      - name: Export APR_LIB_DIR
        run: echo "APR_LIB_DIR=$GITHUB_WORKSPACE/lib" >> "$GITHUB_ENV"

      - name: Run the placeholder-guard E2E suite (must pass)
        run: tests/lib/bats-core/bin/bats --tap tests/e2e/test_prompt_placeholder_guard.bats

      - name: Run the error-contract integration suite (must pass)
        run: tests/lib/bats-core/bin/bats --tap tests/integration/test_error_contract.bats
