name: template-workflow
description: Workflow with template blocks (default-safe; no mustache placeholders)

# Canonical attached-file template fixture.
#
# Rationale (see bead bd-1s9): APR refuses to send prompts that contain
# unexpanded mustache-style placeholders (double-curly tokens) because APR
# does not substitute them; the model would see them verbatim and waste
# expensive Oracle runs. APR already attaches the documents to Oracle, so
# the template should instruct the model to read the attached files by
# name instead of trying to embed their contents inline.
#
# For coverage of the placeholder guard itself, see the explicit guard
# fixture in the same directory.

documents:
  readme: README.md
  spec: SPECIFICATION.md
  implementation: IMPLEMENTATION.md

oracle:
  model: "5.2 Thinking"
  thinking_time: heavy

rounds:
  output_dir: .apr/rounds/template

template: |
  First, read the attached README.md.

  Now read the attached SPECIFICATION.md.

  Please analyze and provide feedback on this specification.
  Focus on:
  1. Completeness
  2. Clarity
  3. Technical feasibility

template_with_impl: |
  First, read the attached README.md.

  Now read the attached SPECIFICATION.md.

  And the attached IMPLEMENTATION.md.

  Please analyze the implementation against the specification.
  Focus on:
  1. Specification compliance
  2. Code quality
  3. Missing features
